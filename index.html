<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hệ thống thi Sinh học 2026</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>LUYỆN ĐỀ VIP SINH HỌC 2026</h1>
    </header>

    <main class="container">
        <div id="home-screen">
            <h2>Danh sách đề thi</h2>
            <div id="exam-list" class="grid-list"></div>
        </div>

        <div id="exam-screen" class="hidden">
            <div class="exam-header">
                <button id="btn-back" class="btn-secondary">🔙 Quay lại</button>
                <h2 id="exam-title">Đề thi số X</h2>
            </div>
            
            <div class="exam-layout">
                <div class="pdf-viewer">
                    <iframe id="pdf-frame" src="" width="100%" height="100%" style="border: none;"></iframe>
                </div>

                <div class="answer-panel">
                    <div class="progress-container">
                        <div id="progress-bar" class="progress-bar"></div>
                    </div>
                    
                    <h3>PHIẾU TRẢ LỜI</h3>
                    <form id="answer-form">
                        <div id="answers-container"></div>
                        <button type="button" id="btn-submit" class="btn-primary" style="margin-top: 20px;">Nộp bài</button>
                    </form>
                </div>
            </div>
        </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
