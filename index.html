<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hệ thống thi Sinh học</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>LUYỆN THI SINH HỌC CHƯƠNG TRÌNH MỚI</h1>
    </header>

    <main class="container">
        <div id="home-screen">
            <h2>Danh sách đề thi</h2>
            <p>Chọn một đề để bắt đầu làm bài. Đề đã nộp sẽ bị khóa.</p>
            <div id="exam-list" class="grid-list"></div>
        </div>

        <div id="exam-screen" class="hidden">
            <div class="exam-header">
                <button id="btn-back" class="btn-secondary">🔙 Quay lại</button>
                <h2 id="exam-title">Đề thi số X</h2>
            </div>
            
            <div class="progress-container">
                <div id="progress-bar" class="progress-bar"></div>
            </div>

            <form id="exam-form">
                <div id="questions-container"></div>
                
                <div class="answer-sheet">
                    <h3>Bảng tóm tắt đáp án</h3>
                    <div id="answer-grid" class="answer-grid"></div>
                </div>

                <div class="submit-section">
                    <button type="button" id="btn-submit" class="btn-primary">Nộp bài</button>
                </div>
            </form>
        </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
